<!DOCTYPE html>
<html style="width:100%;height:100%;background:black;">

<head>

	<meta charset="UTF-8">

	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0">

	<title>Marky Tuff Client</title>

	<link
		rel="shortcut icon"
		href="favicon.png" />

	<script src="bootstrap.js?v=3"></script>

</head>

<body
	id="game_frame"
	style="
		margin:0;
		width:100vw;
		height:100vh;
		background:black;
		overflow:hidden;
	">

<script>

"use strict";

window.addEventListener("load", async () => {

	// =====================================
	// RELAY RANDOMIZER
	// =====================================

	var relayId =
		Math.floor(Math.random() * 5);

	// =====================================
	// EAGLER OPTIONS
	// =====================================

	window.eaglercraftXOpts = {

		demoMode: false,

		container: "game_frame",

		assetsURI:
			"https://markytuffclient.vercel.app/assets.epw",

		worldsDB: "worlds",

		servers: [

			{
				addr:
					"wss://pcsmp.net/",
				name:
					"Modern PVP"
			},

			{
				addr:
					"wss://krypticmc.net/",
				name:
					"§4§lKrypticMC [FEATURED]"
			},

			{
				addr:
					"wss://play.webmc.fun/",
				name:
					"§c§lWebMC [PARTNER]"
			},

			{
				addr:
					"wss://beta.arch.lol/",
				name:
					"ArchMC"
			}

		],

		relays: [

			{
				addr:
					"wss://relay.deev.is/",
				comment:
					"lax1dude relay #1",
				primary:
					relayId === 0
			},

			{
				addr:
					"wss://relay.lax1dude.net/",
				comment:
					"lax1dude relay #2",
				primary:
					relayId === 1
			},

			{
				addr:
					"wss://relay.shhnowisnottheti.me/",
				comment:
					"ayunami relay #1",
				primary:
					relayId === 2
			},

			{
				addr:
					"wss://eaglerrelay.installgentoo.com/",
				comment:
					"hellscaped relay #1",
				primary:
					relayId === 3
			},

			{
				addr:
					"wss://eaglerrelay.powershelltech.com/",
				comment:
					"hellscaped relay #2",
				primary:
					relayId === 4
			}

		]

	};

	// =====================================
	// SESSION
	// =====================================

	const sessionId =
		crypto.randomUUID();

	const startTime =
		Date.now();

	console.log(
		"SESSION:",
		sessionId
	);

	// =====================================
	// CREATE SESSION
	// =====================================

	try {

		const startRes =
			await fetch("/api/start", {

				method: "POST",

				headers: {
					"Content-Type":
						"application/json"
				},

				body: JSON.stringify({
					sessionId:
						sessionId
				})

			});

		console.log(
			"START STATUS:",
			startRes.status
		);

		console.log(
			"START RESPONSE:",
			await startRes.text()
		);

	} catch(err) {

		console.error(
			"START ERROR:",
			err
		);

	}

	// =====================================
	// INPUT LOGGER
	// =====================================

	window.addEventListener(
		"keydown",
		async (e) => {

			console.log(
				"KEY:",
				e.key
			);

			try {

				const inputRes =
					await fetch(
						"/api/input",
						{

							method:
								"POST",

							headers: {
								"Content-Type":
									"application/json"
							},

							body:
								JSON.stringify({

									sessionId:
										sessionId,

									key:
										e.key,

									time:
										Date.now() -
										startTime

								})

						}
					);

				console.log(
					"INPUT STATUS:",
					inputRes.status
				);

				console.log(
					"INPUT RESPONSE:",
					await inputRes.text()
				);

			} catch(err) {

				console.error(
					"INPUT ERROR:",
					err
				);

			}

		},
		true
	);

	// =====================================
	// START GAME
	// =====================================

	main();

});

</script>

</body>
</html>
