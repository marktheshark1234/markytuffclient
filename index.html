<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport"
		content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />

	<title>Marky Tuff Client</title>

	<link type="image/png" rel="shortcut icon" href="favicon.png" />

	<script type="text/javascript" src="bootstrap.js"></script>

	<script type="text/javascript">
	"use strict";

	window.addEventListener("load", function() {

		if(window.location.href.indexOf("file:") === 0) {
			alert("Use HTTP instead of opening locally");
			return;
		}

		// =========================================
		// GAME OPTIONS
		// =========================================

		var relayId = Math.floor(Math.random() * 3);

		window.eaglercraftXOpts = {
			demoMode: false,
			container: "game_frame",
			assetsURI: "https://markytuffclient.vercel.app/assets.epw",
			worldsDB: "worlds",

			servers: [
				{ addr: "wss://pcsmp.net/", name: "Modern PVP" },
				{ addr: "wss://krypticmc.net/", name: "KrypticMC" },
				{ addr: "wss://play.webmc.fun/", name: "WebMC" },
				{ addr: "wss://beta.arch.lol/", name: "ArchMC" }
			],

			relays: [
				{ addr: "wss://relay.deev.is/", comment: "relay1", primary: relayId === 0 },
				{ addr: "wss://relay.lax1dude.net/", comment: "relay2", primary: relayId === 1 },
				{ addr: "wss://relay.shhnowisnottheti.me/", comment: "relay3", primary: relayId === 2 }
			]
		};

		// =========================================
		// SESSION
		// =========================================

		let sessionId = crypto.randomUUID();
		let startTime = Date.now();

		console.log("SESSION:", sessionId);

		fetch("/api/start", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify({
				sessionId: sessionId
			})
		})
		.then(r => r.text())
		.then(console.log)
		.catch(console.error);

		// =========================================
		// INPUT QUEUE
		// =========================================

		let inputQueue = [];

		window.addEventListener("keydown", function(e) {

			console.log("CAPTURED:", e.key);

			inputQueue.push({
				key: e.key,
				time: Date.now() - startTime
			});

		}, true);

		// =========================================
		// SEND INPUTS EVERY SECOND
		// =========================================

		setInterval(() => {

			if(inputQueue.length === 0) return;

			const batch = [...inputQueue];

			inputQueue = [];

			console.log("SENDING BATCH:", batch.length);

			fetch("/api/input", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify({
					sessionId: sessionId,
					inputs: batch
				})
			})
			.then(r => r.text())
			.then(console.log)
			.catch(console.error);

		}, 1000);

		// =========================================
		// END GAME
		// =========================================

		window.endGame = function(score) {

			fetch("/api/end", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify({
					sessionId: sessionId,
					score: score
				})
			});

		};

		// =========================================
		// START GAME
		// =========================================

		main();

	});
	</script>

</head>

<body
	style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;"
	id="game_frame">
</body>

</html>
