<!DOCTYPE html>
<html style="width:100%;height:100%;background:black;">

<head>

	<meta charset="UTF-8" />

	<meta name="viewport"
		content="width=device-width, initial-scale=1.0">

	<title>Marky Tuff Client</title>

	<link rel="shortcut icon" href="favicon.png" />

	<script src="bootstrap.js"></script>

	<script>

"use strict";

window.addEventListener("load", function() {

	// =====================================
	// GAME OPTIONS
	// =====================================

	var relayId =
		Math.floor(Math.random() * 3);

	window.eaglercraftXOpts = {

		demoMode: false,

		container: "game_frame",

		assetsURI:
			"https://markytuffclient.vercel.app/assets.epw",

		worldsDB: "worlds",

		servers: [
			{
				addr: "wss://pcsmp.net/",
				name: "Modern PVP"
			},
			{
				addr: "wss://krypticmc.net/",
				name: "KrypticMC"
			},
			{
				addr: "wss://play.webmc.fun/",
				name: "WebMC"
			}
		],

		relays: [
			{
				addr: "wss://relay.deev.is/",
				primary: relayId === 0
			},
			{
				addr: "wss://relay.lax1dude.net/",
				primary: relayId === 1
			},
			{
				addr:
				"wss://relay.shhnowisnottheti.me/",
				primary: relayId === 2
			}
		]

	};

	// =====================================
	// SESSION
	// =====================================

	const sessionId =
		crypto.randomUUID();

	const startTime =
		Date.now();

	console.log(
		"SESSION CREATED:",
		sessionId
	);

	// =====================================
	// CREATE SESSION
	// =====================================

	fetch("/api/start", {

		method: "POST",

		headers: {
			"Content-Type": "application/json"
		},

		body: JSON.stringify({
			sessionId: sessionId
		})

	})
	.then(r => r.text())
	.then(console.log)
	.catch(console.error);

	// =====================================
	// LOCAL INPUT QUEUE
	// =====================================

	const inputQueue = [];

	// =====================================
	// KEY LISTENER
	// =====================================

	window.addEventListener(
		"keydown",
		function(e) {

			console.log(
				"KEY:",
				e.key,
				"SESSION:",
				sessionId
			);

			inputQueue.push({

				key: e.key,

				time:
					Date.now() -
					startTime

			});

		},
		true
	);

	// =====================================
	// SEND INPUTS
	// =====================================

	setInterval(function() {

		if(inputQueue.length === 0) {
			return;
		}

		const batch =
			[...inputQueue];

		inputQueue.length = 0;

		console.log(
			"SENDING SESSION:",
			sessionId
		);

		console.log(
			"BATCH SIZE:",
			batch.length
		);

		fetch("/api/input", {

			method: "POST",

			headers: {
				"Content-Type":
					"application/json"
			},

			body: JSON.stringify({

				sessionId:
					sessionId,

				inputs:
					batch

			})

		})
		.then(r => r.text())
		.then(console.log)
		.catch(console.error);

	}, 1000);

	// =====================================
	// START GAME
	// =====================================

	main();

});

	</script>

</head>

<body
	id="game_frame"
	style="
		margin:0;
		width:100%;
		height:100%;
		overflow:hidden;
		background:black;
	">
</body>

</html>
