<!DOCTYPE html>
<html>

<head>

	<meta charset="UTF-8">

	<title>Game</title>

	<script src="bootstrap.js?v=2"></script>

</head>

<body
	id="game_frame"
	style="
		margin:0;
		width:100vw;
		height:100vh;
		background:black;
		overflow:hidden;
	">

<script>

"use strict";

window.addEventListener("load", async () => {

	// =========================
	// GAME OPTIONS
	// =========================

	window.eaglercraftXOpts = {

		container: "game_frame",

		assetsURI:
			"https://markytuffclient.vercel.app/assets.epw"

	};

	// =========================
	// SESSION
	// =========================

	const sessionId =
		crypto.randomUUID();

	const startTime =
		Date.now();

	console.log(
		"SESSION:",
		sessionId
	);

	// =========================
	// CREATE SESSION
	// =========================

	try {

		const startRes =
			await fetch("/api/start", {

				method: "POST",

				headers: {
					"Content-Type":
						"application/json"
				},

				body: JSON.stringify({
					sessionId:
						sessionId
				})

			});

		console.log(
			"START STATUS:",
			startRes.status
		);

		console.log(
			"START RESPONSE:",
			await startRes.text()
		);

	} catch(err) {

		console.error(
			"START ERROR:",
			err
		);

	}

	// =========================
	// KEY LOGGER
	// =========================

	window.addEventListener(
		"keydown",
		async (e) => {

			console.log(
				"KEY:",
				e.key
			);

			try {

				const inputRes =
					await fetch(
						"/api/input",
						{

							method:
								"POST",

							headers: {
								"Content-Type":
									"application/json"
							},

							body:
								JSON.stringify({

									sessionId:
										sessionId,

									key:
										e.key,

									time:
										Date.now() -
										startTime

								})

						}
					);

				console.log(
					"INPUT STATUS:",
					inputRes.status
				);

				console.log(
					"INPUT RESPONSE:",
					await inputRes.text()
				);

			} catch(err) {

				console.error(
					"INPUT ERROR:",
					err
				);

			}

		},
		true
	);

	// =========================
	// START GAME
	// =========================

	main();

});

</script>

</body>
</html>
