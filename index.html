<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
	<meta name="description" content="gams.lol | Play tons of Eaglercraft clients in your browser." />
	<meta name="keywords" content="eaglercraft, minecraft" />

	<title>Marky Tuff Client</title>

	<link type="image/png" rel="shortcut icon" href="favicon.png" />

	<script type="text/javascript" src="bootstrap.js"></script>

	<script type="text/javascript">
	"use strict";

	window.addEventListener("load", function() {

		if(window.location.href.indexOf("file:") === 0) {
			alert("Use HTTP, not local files");
			return;
		}

		// =========================
		// GAME OPTIONS
		// =========================

		var relayId = Math.floor(Math.random() * 3);

		window.eaglercraftXOpts = {
			demoMode: false,
			container: "game_frame",
			assetsURI: "https://markytuffclient.vercel.app/assets.epw",
			worldsDB: "worlds",

			servers: [
				{ addr: "wss://play.freepvp.org/", name: "VoidSent" },
				{ addr: "wss://krypticmc.net/", name: "§4§lKrypticMC [FEATURED]" },
				{ addr: "wss://play.webmc.fun/", name: "§c§lWebMC [PARTNER]" },
				{ addr: "wss://beta.arch.lol/", name: "ArchMC" }
			],

			relays: [
				{ addr: "wss://relay.deev.is/", comment: "relay #1", primary: relayId === 0 },
				{ addr: "wss://relay.lax1dude.net/", comment: "relay #2", primary: relayId === 1 },
				{ addr: "wss://relay.shhnowisnottheti.me/", comment: "relay #3", primary: relayId === 2 }
			]
		};

		// =========================
		// SESSION TRACKING
		// =========================

		let sessionId = crypto.randomUUID();
		let startTime = Date.now();

		console.log("SESSION:", sessionId);

		// create session
		fetch("/api/start", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify({
				sessionId: sessionId
			})
		})
		.then(res => res.text())
		.then(console.log)
		.catch(console.error);

		// =========================
		// INPUT TRACKING
		// =========================

		window.addEventListener("keyup", (e) => {

			console.log("KEY:", e.key);

			fetch("/api/input", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify({
					sessionId: sessionId,
					key: e.key,
					time: Date.now() - startTime
				})
			})
			.then(res => res.text())
			.then(console.log)
			.catch(console.error);

		});

		// =========================
		// END GAME FUNCTION
		// =========================

		window.endGame = function(score) {

			fetch("/api/end", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify({
					sessionId: sessionId,
					score: score
				})
			})
			.then(res => res.text())
			.then(console.log)
			.catch(console.error);

		};

		// =========================
		// START GAME
		// =========================

		main();

	});
	</script>

</head>

<body
	style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;"
	id="game_frame">
</body>

</html>
