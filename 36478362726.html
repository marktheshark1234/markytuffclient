<!DOCTYPE html>
<html>
<head>
	<title>Session Viewer</title>

	<style>
		body {
			background: black;
			color: white;
			font-family: monospace;
			padding: 20px;
		}

		.session {
			border: 1px solid #444;
			margin-bottom: 20px;
			padding: 10px;
		}

		.input {
			color: #aaa;
			margin-left: 20px;
		}
	</style>
</head>

<body>

<h1>Sessions</h1>

<div id="container"></div>

<script>

const SUPABASE_URL = "https://jdzimxwvsxopagtrmbss.supabase.co";
const SUPABASE_KEY = "YOUR_KEY_HERE";

async function load() {

	const container = document.getElementById("container");

	container.innerHTML = "Loading...";

	// get sessions
	const sessionsRes = await fetch(
		SUPABASE_URL + "/rest/v1/sessions?select=*",
		{
			headers: {
				apikey: SUPABASE_KEY
			}
		}
	);

	const sessions = await sessionsRes.json();

	// get inputs
	const inputsRes = await fetch(
		SUPABASE_URL + "/rest/v1/inputs?select=*",
		{
			headers: {
				apikey: SUPABASE_KEY
			}
		}
	);

	const inputs = await inputsRes.json();

	container.innerHTML = "";

	sessions.reverse();

	for(const session of sessions) {

		const div = document.createElement("div");
		div.className = "session";

		const title = document.createElement("h2");

		title.textContent =
			"Session: " + session.id;

		div.appendChild(title);

		const sessionInputs =
			inputs.filter(i =>
				String(i.session_id) === String(session.id)
			);

		for(const input of sessionInputs) {

			const p = document.createElement("div");

			p.className = "input";

			p.textContent =
				input.time_ms + "ms → " + input.key;

			div.appendChild(p);

		}

		container.appendChild(div);

	}

}

load();

setInterval(load, 3000);

</script>

</body>
</html>
