<!DOCTYPE html>
<html>

<head>
	<title>Session Viewer</title>

	<style>
		body {
			background: #000;
			color: white;
			font-family: monospace;
			padding: 20px;
		}

		.session {
			border: 1px solid #444;
			padding: 10px;
			margin-bottom: 20px;
		}

		.input {
			margin-left: 20px;
			color: #aaa;
		}
	</style>
</head>

<body>

<h1>Sessions + Inputs</h1>

<div id="container">Loading...</div>

<script>

const SUPABASE_URL =
	"https://jdzimxwvsxopagtrmbss.supabase.co";

const SUPABASE_KEY =
	"sb_publishable_cGxBmqFfW2Aq_ilYBFM8cQ_DJo1e65f";

async function loadData() {

	const container =
		document.getElementById("container");

	container.innerHTML = "Loading...";

	// =====================================
	// LOAD SESSIONS
	// =====================================

	const sessionsResponse = await fetch(
		SUPABASE_URL +
		"/rest/v1/sessions?select=*",
		{
			headers: {
				apikey: SUPABASE_KEY
			}
		}
	);

	const sessions =
		await sessionsResponse.json();

	// =====================================
	// LOAD INPUTS
	// =====================================

	const inputsResponse = await fetch(
		SUPABASE_URL +
		"/rest/v1/inputs?select=*",
		{
			headers: {
				apikey: SUPABASE_KEY
			}
		}
	);

	const inputs =
		await inputsResponse.json();

	console.log("SESSIONS:", sessions);
	console.log("INPUTS:", inputs);

	container.innerHTML = "";

	// newest first
	sessions.reverse();

	for(const session of sessions) {

		const div =
			document.createElement("div");

		div.className = "session";

		const title =
			document.createElement("h2");

		title.textContent =
			"Session: " + session.id;

		div.appendChild(title);

		// =====================================
		// MATCH INPUTS
		// =====================================

		const matchedInputs = inputs.filter(input => {

			return (
				String(input.session_id).trim() ===
				String(session.id).trim()
			);

		});

		console.log(
			"MATCHED",
			session.id,
			matchedInputs.length
		);

		// =====================================
		// SHOW INPUTS
		// =====================================

		if(matchedInputs.length === 0) {

			const none =
				document.createElement("div");

			none.className = "input";

			none.textContent = "(no inputs)";

			div.appendChild(none);

		} else {

			matchedInputs.sort((a, b) =>
				a.time_ms - b.time_ms
			);

			for(const input of matchedInputs) {

				const line =
					document.createElement("div");

				line.className = "input";

				line.textContent =
					input.time_ms +
					"ms → " +
					input.key;

				div.appendChild(line);

			}

		}

		container.appendChild(div);

	}

}

loadData();

// auto refresh every 3 sec
setInterval(loadData, 3000);

</script>

</body>
</html>
