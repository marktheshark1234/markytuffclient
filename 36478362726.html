<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-family:monospace;">

<h1>RAW DEBUG</h1>

<pre id="out"></pre>

<script>

const SUPABASE_URL =
	"https://jdzimxwvsxopagtrmbss.supabase.co";

const SUPABASE_KEY =
	"sb_publishable_cGxBmqFfW2Aq_ilYBFM8cQ_DJo1e65f";

async function run() {

	const out = document.getElementById("out");

	// LOAD SESSIONS
	const sRes = await fetch(
		SUPABASE_URL + "/rest/v1/sessions?select=*",
		{
			headers: {
				apikey: SUPABASE_KEY
			}
		}
	);

	const sessions = await sRes.json();

	// LOAD INPUTS
	const iRes = await fetch(
		SUPABASE_URL + "/rest/v1/inputs?select=*",
		{
			headers: {
				apikey: SUPABASE_KEY
			}
		}
	);

	const inputs = await iRes.json();

	out.textContent =
		"SESSIONS:\n\n" +
		JSON.stringify(sessions.slice(0, 5), null, 2) +
		"\n\nINPUTS:\n\n" +
		JSON.stringify(inputs.slice(0, 20), null, 2);

}

run();

</script>

</body>
</html>
