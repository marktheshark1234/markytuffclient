<!DOCTYPE html>
<html>

<head>

	<title>Session Viewer</title>

	<style>

		body {
			background: black;
			color: white;
			font-family: monospace;
			padding: 20px;
		}

		.session {
			border: 1px solid #444;
			padding: 10px;
			margin-bottom: 20px;
		}

		.input {
			margin-left: 20px;
			color: #aaa;
		}

		button {
			padding: 10px;
			font-size: 16px;
			margin-bottom: 20px;
		}

	</style>

</head>

<body>

<h1>Sessions</h1>

<button onclick="loadData()">
	Refresh
</button>

<div id="container">
	Loading...
</div>

<script>

const SUPABASE_URL =
	"https://jdzimxwvsxopagtrmbss.supabase.co";

const SUPABASE_KEY =
	"sb_publishable_cGxBmqFfW2Aq_ilYBFM8cQ_DJo1e65f";

async function loadData() {

	const container =
		document.getElementById(
			"container"
		);

	container.innerHTML =
		"Loading...";

	// =====================================
	// LOAD SESSIONS
	// =====================================

	const sessionsRes =
		await fetch(

			SUPABASE_URL +

			"/rest/v1/sessions?select=*",

			{
				headers: {
					apikey:
						SUPABASE_KEY
				}
			}

		);

	const sessions =
		await sessionsRes.json();

	console.log(
		"SESSIONS:",
		sessions
	);

	container.innerHTML = "";

	// newest first
	sessions.reverse();

	// =====================================
	// LOAD EACH SESSION
	// =====================================

	for(const session of sessions) {

		// -----------------------------
		// LOAD INPUTS FOR SESSION
		// -----------------------------

		const inputsRes =
			await fetch(

				SUPABASE_URL +

				"/rest/v1/inputs" +

				"?session_id=eq." +

				session.id +

				"&select=*",

				{
					headers: {
						apikey:
							SUPABASE_KEY
					}
				}

			);

		const inputs =
			await inputsRes.json();

		console.log(
			"SESSION:",
			session.id,
			"INPUTS:",
			inputs.length
		);

		// -----------------------------
		// SESSION BOX
		// -----------------------------

		const div =
			document.createElement(
				"div"
			);

		div.className =
			"session";

		const title =
			document.createElement(
				"h2"
			);

		title.textContent =

			"Session: " +

			session.id +

			" | Inputs: " +

			inputs.length;

		div.appendChild(title);

		// -----------------------------
		// SORT INPUTS
		// -----------------------------

		inputs.sort(
			(a, b) =>
				a.time_ms -
				b.time_ms
		);

		// -----------------------------
		// SHOW INPUTS
		// -----------------------------

		for(const input of inputs) {

			const line =
				document.createElement(
					"div"
				);

			line.className =
				"input";

			line.textContent =

				input.time_ms +

				"ms → " +

				input.key;

			div.appendChild(line);

		}

		container.appendChild(div);

	}

}

loadData();

</script>

</body>
</html>
